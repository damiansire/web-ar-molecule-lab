<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- El bundle+WASM de MediaPipe se vendorizan desde 'self' (ver vite.config.ts);
         solo el modelo (.task) sigue viniendo de este origen. -->
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://storage.googleapis.com" />
    <title>Alchemy Cauldron — combine atoms with your hands and voice</title>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <!-- Capa WebGL transparente: solo dibuja los átomos/moléculas en 3D real,
         encima del video+HUD 2D que sigue pintando #stage. -->
    <canvas id="scene3d"></canvas>
    <video id="cam" playsinline muted></video>

    <!-- Selector de idioma siempre visible (también dentro del juego). -->
    <div id="langbar" class="langbar" role="group" aria-label="Language / Idioma"></div>

    <div id="overlay">
      <!-- Caja 1: selector de idioma, separado de la cámara -->
      <div class="card lang-card">
        <div class="lang-title">🌐 Language · Idioma</div>
        <div id="langs" class="langs" role="group" aria-label="Language / Idioma"></div>
      </div>

      <!-- Caja 2: marca + permiso de cámara -->
      <div class="card">
        <div class="logo">⚗️</div>
        <h1 id="title">Alchemy&nbsp;Cauldron</h1>
        <p class="lead">Enable your camera to play.</p>
        <button id="start" type="button">Enable camera</button>
        <button id="manualStart" type="button" class="btn-manual">No camera? Play with keyboard/mouse</button>
        <p class="privacy">🔒 Runs on your device · your camera never leaves it</p>
        <p class="hint" id="status">Nothing loads until you start.</p>
      </div>
    </div>

    <aside id="info" class="hidden"></aside>

    <!-- Consentimiento GDPR: se muestra una sola vez, antes del primer getUserMedia.
         La decisión (aceptar) se persiste en localStorage (ver privacy-consent.ts). -->
    <div id="consent" class="hidden" role="dialog" aria-modal="true" aria-labelledby="consentTitle">
      <div class="card">
        <h2 id="consentTitle">Before enabling the camera</h2>
        <p id="consentBody"></p>
        <div class="consent-actions">
          <button id="consentAccept" type="button"></button>
          <button id="consentDecline" type="button" class="btn-manual"></button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
